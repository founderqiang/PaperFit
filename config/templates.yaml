version: "2.0"
description: "PaperFit template registry for migration, portraiting, and compatibility checks"

templates:
  ICLR2025:
    id: "ICLR2025"
    name: "ICLR 2025"
    family: "ICLR"
    year: 2025
    publisher: "OpenReview"
    venue_type: "conference"
    documentclass: '\documentclass{article}'
    column_type: "single"
    paper_size: "letter"
    default_font_size_pt: 10
    text_width: "6.5in"
    column_width: null
    default_figure_width: '\linewidth'
    default_table_width: '\linewidth'
    expected_pages:
      main_body: 9
      with_refs: null
      with_appendix: null
    bibliography_policy:
      refs_count_in_limit: false
      appendix_allowed: true
    page_margins:
      top: "1in"
      bottom: "1in"
      left: "1in"
      right: "1in"
    official_assets:
      class_files: ["iclr2025_conference.sty"]
      bibliography_files: []
      template_files: ["iclr2025_conference.tex"]
      source_url: null
      source_sha256: null
      downloaded_at: null
    required_packages: ["iclr2025_conference", "times"]
    required_preamble_lines:
      - '\usepackage{iclr2025_conference,times}'
      - '\input{math_commands.tex}'
    forbidden_packages: ["fullpage", "geometry"]
    discouraged_packages: []
    package_replacements: {}
    macro_substitutions:
      '\theoremstyle': 'Use \newtheorem directly when amsthm is unavailable'
    macro_compatibility:
      removed_macros: []
      substitutions: {}
      required_shims: []
    float_behavior: "Single-column floats only"
    float_policy:
      wide_figure_env: "figure"
      wide_table_env: "table"
      wide_float_placement: ["h", "t", "b", "p"]
      single_float_placement: ["h", "t", "b", "p"]
      allow_bottom_double_float: false
    width_policy:
      single_column_graphics: '\linewidth'
      double_column_graphics: '\linewidth'
      wide_graphics: '\linewidth'
      single_column_tables: '\linewidth'
      wide_tables: '\linewidth'
    migration_hints:
      normalize_figure_star_when_target_single: true
      normalize_table_star_when_target_single: true
      add_bibliographystyle_if_missing: "plainnat"
      title_affiliation_style: "iclr"
    variants:
      submission:
        anonymized: true
      camera_ready:
        anonymized: false
    tags: ["conference", "single-column", "ml"]
    notes: "ICLR 2025 uses article plus iclr2025_conference; migrations target the final camera-ready mode."

