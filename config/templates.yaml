defaults:
  required_template_fields:
    - "id"
    - "name"
    - "family"
    - "year"
    - "venue_type"
    - "documentclass"
    - "column_type"
    - "default_font_size_pt"
    - "default_figure_width"
    - "default_table_width"
    - "expected_pages"
    - "bibliography_policy"
  single_column:
    default_figure_width: '\linewidth'
    default_table_width: '\linewidth'
  double_column:
    default_figure_width: '\columnwidth'
    default_table_width: '\columnwidth'
    wide_figure_env: "figure*"
    wide_table_env: "table*"

detection_rules:
  - id: "iclr2025-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{iclr2025_conference(?:,times)?\}'
    template: "ICLR2025"
  - id: "neurips2025-docclass"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{neurips_2025\}'
    template: "NeurIPS2025"
  - id: "cvpr-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{cvpr\}'
    template: "CVPR2026"
  - id: "iccv-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{iccv\}'
    template: "ICCV2025"
  - id: "eccv-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{eccv\}'
    template: "ECCV2026"
  - id: "ieeetran-docclass"
    priority: 100
    match:
      any_regex:
        - '\\documentclass(?:\[[^\]]*\])?\{IEEEtran\}'
    template: "IEEE"
  - id: "acl-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{acl\}'
    template: "ACL2025"
  - id: "icml2025-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{icml2025\}'
    template: "ICML2025"
  - id: "aaai2026-package"
    priority: 100
    match:
      any_regex:
        - '\\usepackage(?:\[[^\]]*\])?\{aaai2026\}'
    template: "AAAI2026"
  - id: "aaai-legacy-package"
    priority: 90
    match:
      any_regex:
        - '\\usepackage\{aaai25\}'
        - '\\usepackage\{aaai24\}'
    template: "AAAI2025"
  - id: "generic-twocolumn"
    priority: 10
    match:
      any_regex:
        - 'twocolumn'
    template: null
    patch:
      column_type: "double"

source_registry:
  official_domains:
    - "aaai.org"
    - "openreview.net"
    - "neurips.cc"
    - "thecvf.com"
    - "aclanthology.org"
    - "icml.cc"
    - "ieee.org"
  refresh_policy_days: 180
